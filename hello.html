<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <!-- IMPORTANT: use absolute path if hosted on GitHub -->
  <script src="https://sky.blackbaudcdn.net/static/sky-addin-client/1/sky-addin-client.umd.min.js"></script>
</head>

<body>
  <div style="font-family: Arial; padding: 10px;">
    <h2>Hello World ✅</h2>
    <p>If you see this, the add-in handshake worked.</p>
    <iframe width="300px" height="480px" src="https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=4z-1n489sEy9u6kqxlvJeokWIjImj9JDlEdDrEx84CFURVNZNUUwNENTTUxVWTdFUVU2MEhKOVNLTy4u&embed=true" frameborder="0" marginwidth="0" marginheight="0" style="border: none; max-width:100%; max-height:100vh" allowfullscreen webkitallowfullscreen mozallowfullscreen msallowfullscreen> </iframe>
  </div>

  <script>
    function initAddin() {
      if (window.BBSkyAddinClient) {

        var client = new BBSkyAddinClient.AddinClient({
          callbacks: {
            init: function(args) {

              // ✅ THIS is the critical handshake
              args.ready({
                showUI: true,
                title: 'Hello World Test'
              });

            }
          }
        });

      } else {
        console.log("Library not ready, retrying...");
        setTimeout(initAddin, 50);
      }
    }

    initAddin();
  </script>

</body>
</html>
