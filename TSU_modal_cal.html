<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <base target="_top">
    <!-- Correct CDN Script Path matching your working file -->
    <script src="https://blackbaudcdn.net"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <!-- Container for your form. Hidden by default on the home page, shown inside the popup modal -->
    <div id="formContainer" style="display: none; height: 100vh;">
        <!-- Replace this src with your temporary Google Form, Fillout, or eventual Kuali Form -->
        <iframe src="https://google.com"></iframe>
    </div>

    <script>
        function initAddin() {
            // Check for the exact global variable from your working file
            if (window.BBSkyAddinClient) {
                
                // Determine if we are inside the popup modal or background sidebar mode
                var urlParams = new URLSearchParams(window.location.search);
                var isModalView = urlParams.get('view') === 'modal';

                if (isModalView) {
                    // --- MODAL LAYOUT VIEW ---
                    document.getElementById('formContainer').style.display = 'block';

                    var modalClient = new BBSkyAddinClient.AddinClient({
                        callbacks: {
                            init: function(args) {
                                args.ready({ showUI: true });
                            }
                        }
                    });

                } else {
                    // --- SIDEBAR ACTIONS LINK REGISTER VIEW ---
                    var sidebarClient = new BBSkyAddinClient.AddinClient({
                        callbacks: {
                            init: function(args) {
                                // This registers the hyperlink text on your Home Page sidebar
                                args.ready({
                                    showUI: true,
                                    title: 'Gift Intake Kuali'
                                });
                            },
                            buttonClick: function() {
                                // Triggers the popup modal when a user clicks the sidebar link
                                sidebarClient.showModal({
                                    url: 'https://github.io'
                                });
                            }
                        }
                    });
                }

            } else {
                // Polling loop safety catch matching your working file
                setTimeout(initAddin, 50);
            }
        }
        
        // Execute the script loop
        initAddin();
    </script>
</body>
</html>
