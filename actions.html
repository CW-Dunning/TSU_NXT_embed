<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <!-- SKY Add-in Client (REQUIRED for NXT) -->
  <script src="https://sky.blackbaudcdn.net/static/sky-addin-client/1/sky-addin-client.umd.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 10px;
      margin: 0;
    }

    button {
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    #iframeContainer {
      margin-top: 10px;
    }

    iframe {
      width: 100%;
      height: 800px;
      border: none;
    }
  </style>
</head>

<body>

  <h3 style="margin-top:0;">Data Dictionary</h3>

  <button onclick="loadDictionary()">Open Dictionary</button>

  <div id="iframeContainer"></div>

  <script>
    // 🔑 Handshake (your working version)
    function initAddin() {
      if (window.BBSkyAddinClient) {

        var client = new BBSkyAddinClient.AddinClient({
          callbacks: {
            init: function(args) {

              args.ready({
                showUI: true,
                title: 'Data Dictionary'
              });

            }
          }
        });

      } else {
        console.log("Library not ready, retrying...");
        setTimeout(initAddin, 50);
      }
    }

    initAddin();
