<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <base target="_top">
    <script src="https://sky.blackbaudcdn.net/static/sky-addin-client/1/sky-addin-client.umd.min.js"></script>
</head>
<body>
    <div style="font-family: sans-serif; padding: 10px;">
        <h3 style="margin-top:0;">Gift Intake Reference</h3>
        
        <iframe width="100%" height="514" frameborder="0" scrolling="no" src="https://campusworksinc0.sharepoint.com/sites/CW-TarletonStateUniversity/_layouts/15/Doc.aspx?sourcedoc={0d7265fc-78e8-4ef7-9d31-53d8ac1278f5}&action=embedview&wdAllowInteractivity=False&Item=Table1&wdHideGridlines=True&wdDownloadButton=True&wdInConfigurator=True&wdInConfigurator=True&edaebf=rslc0"></iframe>
    </div>

    <script>
        // 2. The "Library Guard" function
        function initAddin() {
            // Check if the Blackbaud library is loaded yet
            if (window.BBSkyAddinClient) {
               
                var client = new BBSkyAddinClient.AddinClient({
                    callbacks: {
                        init: function(args) {
                            // 3. THE HANDSHAKE
                            args.ready({
                                showUI: true,
                                title: 'Gift Intake Reference'
                            });
                        }
                    }
                });
            } else {
                // If not loaded, wait 50ms and try again
                console.log("Library not ready, retrying...");
                setTimeout(initAddin, 50);
            }
        }

        // Start the check
        initAddin();
    </script>
</body>
</html>
