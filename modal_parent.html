<body>

<script>
var client = new BBSkyAddinClient.AddinClient({
  callbacks: {
    init: function(args) {

      args.ready({
        showUI: true,
        title: "Open Modal"
      });

      // ✅ Launch modal immediately (no button needed)
      client.showModal({
        url: "https://cw-dunning.github.io/TSU_NXT_embed/test_popout.html",
        context: {}
      });

    }
  }
});
</script>
