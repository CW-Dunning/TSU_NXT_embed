<!DOCTYPE html>
<html>
<head>
  <title>Data Dictionary</title>

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px;
    }

    button {
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    #container {
      margin-top: 10px;
      width: 100%;
    }

    iframe {
      width: 100%;
      height: 800px;
      border: none;
    }

</head>

        <iframe width="400" height="514" frameborder="0" scrolling="no" src="https://campusworksinc0.sharepoint.com/sites/CW-TarletonStateUniversity/_layouts/15/Doc.aspx?sourcedoc={0d7265fc-78e8-4ef7-9d31-53d8ac1278f5}&action=embedview&wdAllowInteractivity=False&Item=Table1&wdHideGridlines=True&wdDownloadButton=True&wdInConfigurator=True&wdInConfigurator=True&edaebf=rslc0">

      `;
    }
  </script>

</body>
</html>
